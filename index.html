<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Hello World | Basic Static Page</title>
  <style>
    /* clean, minimal reset for consistent rendering */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f0f4fa 0%, #d9e2ec 100%);
      font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }

    /* main card container – soft, modern, responsive */
    .hello-card {
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(2px);
      border-radius: 3rem;
      padding: 3rem 2.5rem;
      max-width: 680px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 8px 18px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.6);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .hello-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.3);
    }

    /* main greeting style */
    .greeting {
      font-size: clamp(2.8rem, 10vw, 5.6rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #1f2b3c, #2c3e50);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 2px 2px 12px rgba(0,0,0,0.05);
      margin-bottom: 0.5rem;
    }

    /* subtext / playful secondary line */
    .sub-message {
      font-size: 1.2rem;
      color: #2c3e50;
      margin-top: 0.75rem;
      font-weight: 450;
      border-top: 2px solid rgba(44, 62, 80, 0.15);
      display: inline-block;
      padding-top: 1rem;
      line-height: 1.4;
    }

    /* decorative wave separator */
    .wave {
      font-size: 2.2rem;
      margin: 1rem 0 0.5rem 0;
      letter-spacing: 6px;
      opacity: 0.7;
    }

    /* simple footer / info line */
    .info {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: #4a627a;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
      padding-top: 1.8rem;
      font-weight: 400;
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .info span {
      background: rgba(44, 62, 80, 0.06);
      padding: 0.3rem 0.8rem;
      border-radius: 40px;
      font-size: 0.75rem;
    }

    /* optional emoji animation for fun */
    .emoji-pulse {
      display: inline-block;
      animation: gentleFloat 2s infinite ease-in-out;
    }

    @keyframes gentleFloat {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0px); }
    }

    /* accessibility & focus style */
    .hello-card:focus-visible {
      outline: 3px solid #2c3e50;
      outline-offset: 4px;
    }

    /* responsive adjustments */
    @media (max-width: 480px) {
      .hello-card {
        padding: 2rem 1.5rem;
        border-radius: 2rem;
      }
      .sub-message {
        font-size: 1rem;
      }
      .info span {
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>
  <main class="hello-card" role="main" aria-label="Hello World greeting card">
    <!-- main hello world headline -->
    <div class="greeting">
      Hello, World! 🌍
    </div>

    <!-- decorative wave / friendly divider -->
    <div class="wave" aria-hidden="true">
      ~~ ✨ ~~
    </div>

    <!-- secondary friendly phrase -->
    <div class="sub-message">
      <span class="emoji-pulse">👋</span> Welcome to your first static HTML page 
      <span class="emoji-pulse">🚀</span>
    </div>

    <!-- subtle footer with tech info & fun fact -->
    <div class="info">
      <span>✨ pure HTML / CSS</span>
      <span>⚡ responsive & semantic</span>
      <span>💫 no frameworks</span>
      <span>📅 classic "hello world"</span>
    </div>
  </main>
</body>
</html>
